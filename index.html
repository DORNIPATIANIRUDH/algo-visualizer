<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AlgoViz</title>

    <!-- PWA -->
    <link rel="manifest" href="/algo-visualizer/manifest.json">
    <meta name="theme-color" content="#5b8df5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="AlgoViz">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/algo-visualizer/assets/index-BpdeOWDz.js"></script>
    <link rel="stylesheet" crossorigin href="/algo-visualizer/assets/index-DYPFnrYA.css">
  </head>
  <body>
    <div id="root"></div>

    <!-- Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/algo-visualizer/sw.js')
            .then(() => console.log('AlgoViz: offline ready ✓'))
            .catch(e => console.log('SW failed:', e));
        });
      }
    </script>
  </body>
</html>
